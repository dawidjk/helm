<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Preload critical Latin subset fonts to eliminate FOIT/FOUT -->
    <link rel="preload" href="/src/index.css" as="style" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070d" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f6f8" />
    <!-- Theme pre-paint: apply saved light/dark choice before first paint (no flash). -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('helm-theme');
          if (m === 'light' || m === 'dark') {
            document.documentElement.setAttribute('data-theme', m);
          }
        } catch (e) {}
      })();
    </script>
    <!-- Inter is self-hosted via @fontsource (imported in src/index.css) -->
    <!-- title + description are set per-page via Head (see src/components/Meta.tsx) -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
